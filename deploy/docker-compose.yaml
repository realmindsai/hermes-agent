services:
  hermes-dee:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.gateway
    image: hermes-gateway:latest
    container_name: hermes-dee
    restart: "no"
    volumes:
      - /tank/services/active_services/hermes-dee:/data
      - /run/secrets/hermes-dee/.env:/data/.env:ro
      - /tank/services/active_services/hermes/deploy/config-dee.yaml:/data/config.yaml:ro
    environment:
      - HERMES_HOME=/data
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  hermes-tracy:
    image: hermes-gateway:latest
    container_name: hermes-tracy
    restart: "no"
    volumes:
      - /tank/services/active_services/hermes-tracy:/data
      - /run/secrets/hermes-tracy/.env:/data/.env:ro
      - /tank/services/active_services/hermes/deploy/config-tracy.yaml:/data/config.yaml:ro
    environment:
      - HERMES_HOME=/data
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
